<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f4f7fc;
        }

        .container {
            text-align: center;
            background: white;
            padding: 30px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            border-radius: 8px;
        }

        h2 {
            color: #4e73df;
        }

        .buttons {
            margin-top: 20px;
        }

        button {
            background-color: #4e73df;
            color: white;
            padding: 12px 20px;
            font-size: 16px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin: 10px;
        }

        button:hover {
            background-color: #2e59d9;
        }
    </style>
</head>
<body>

    <div class="container">
        <h2>Are you an existing user?</h2>
        <div class="buttons">
        <a href="existing_user/">
            <button>Yes, I am an existing user</button>
        </a>
        <a href="index/">
                <button>No, I am a new user</button>
            </a>
        </div>
    </div>
</html>
